<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      
      <div class="card shadow-lg">
        <div class="card-body">

          <h3 class="text-center mb-4" id="formTitle">Register</h3>

          <!-- REGISTER FORM -->
          <form id="registerForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="regName" placeholder="Full Name">
              <small class="text-danger" id="regNameError"></small>
            </div>

            <div class="mb-3">
              <input type="email" class="form-control" id="regEmail" placeholder="Email">
              <small class="text-danger" id="regEmailError"></small>
            </div>

            <div class="mb-3">
              <input type="password" class="form-control" id="regPassword" placeholder="Password">
              <small class="text-danger" id="regPasswordError"></small>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Register</button>
            </div>

            <p class="text-center mt-3">
              Already have account? 
              <a href="#" onclick="showLogin()">Login</a>
            </p>
          </form>

          <!-- LOGIN FORM -->
          <form id="loginForm"  style="display:none;">
            <div class="mb-3">
              <input type="email" class="form-control" id="loginEmail" placeholder="Email">
              <small class="text-danger" id="loginEmailError"></small>
            </div>

            <div class="mb-3">
              <input type="password" class="form-control" id="loginPassword" placeholder="Password">
              <small class="text-danger" id="loginPasswordError"></small>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success" >Login</button>
            </div>

            <p class="text-center mt-3">
              Don't have account? 
              <a href="#" onclick="showRegister()">Register</a>
            </p>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>


<script>
  function showLogin() {
  document.getElementById("registerForm").style.display = "none";
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("formTitle").innerText = "Login";
}

function showRegister() {
  document.getElementById("loginForm").style.display = "none";
  document.getElementById("registerForm").style.display = "block";
  document.getElementById("formTitle").innerText = "Register";
}

// REGISTER


document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("regName").value.trim();
  let email = document.getElementById("regEmail").value.trim();
  let password = document.getElementById("regPassword").value.trim();

  if(name === "" || email === "" || password.length < 6){
    alert("Please fill all fields correctly");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let exists = users.find(u => u.email === email);
  if(exists){
    alert("Email already registered!");
    return;
  }

  let newUser = { name, email, password };

  users.push(newUser);

  localStorage.setItem("users", JSON.stringify(users));

  localStorage.setItem("loggedUser", name);

  alert("Registration Successful!");
  window.location.href = "Home page.html";
});

// LOGIN



document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  let email = document.getElementById("loginEmail").value.trim();
  let password = document.getElementById("loginPassword").value.trim();

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let validUser = users.find(u => u.email === email && u.password === password);

  if(validUser){

    localStorage.setItem("loggedUser", validUser.name);

    alert("Login Successful! Welcome " + validUser.name);
    window.location.href = "Home page.html";

  } else {
    alert("Invalid Email or Password");
  }
});
</script>
</body>
</html>
